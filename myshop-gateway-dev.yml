server:
  port: 8222

spring:
  application:
    name: myshop-gateway
  zipkin:
    base-url: http://localhost:9042
    sender:
      type: web
  sleuth:
    sampler:
      probability: 1
  cloud:
    gateway:
      routes:
        - id: myshop-user
          uri: lb://myshop-user
          predicates:
            - Path=/myshop-user/**
          filters:
            - StripPrefix=1
        - id: myshop-web
          uri: lb://myshop-web
          predicates:
            - Path=/myshop-web/**
          filters:
            - StripPrefix=1

springdoc:
  swagger-ui:
    urls:
      - name: myshop-user
        url: /myshop-user/v3/api-docs
      - name: myshop-web
        url: /myshop-web/v3/api-docs

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8888/eureka
  instance:
    prefer-ip-address: true
